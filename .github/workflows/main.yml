name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Limpiar cache
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: Instalar dependencias
        run: npm install --no-save --legacy-peer-deps

      # 🔥 BUILD REAL
      - name: Construir proyecto
        run: |
          npm run build
          echo "=== DIST CONTENT ==="
          ls -la dist || true
          echo "=== INDEX SEARCH ==="
          find dist -name index.html || true

      # 🔥 VALIDACIÓN CORRECTA
      - name: Verificar build
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ ERROR: No existe dist/index.html"
            exit 1
          fi

      - name: Instalar Android
        run: npx cap add android || true

      - name: Copiar archivos
        run: npx cap copy

      - name: Sincronizar Capacitor
        run: npx cap sync

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Permisos
        run: chmod +x android/gradlew

      - name: Compilar APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
