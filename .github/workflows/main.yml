name: Build Veymar AI APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node correcto (evita EBADENGINE)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci || npm install

      # 4. Build web app
      - name: Build web app
        run: npm run build

      # 5. Capacitor setup
      - name: Install Capacitor
        run: |
          npm install @capacitor/cli @capacitor/android
          npx cap sync

      # 6. Verificar estructura del proyecto
      - name: Debug project structure
        run: |
          echo "Root files:"
          ls -la
          echo "Android folder:"
          ls -la android || echo "No android folder"

      # 7. Setup Java (compatible con Android Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 8. Build APK (ROBUSTO)
      - name: Build Android APK
        run: |
          # Si no existe Android, lo crea
          if [ ! -d "android" ]; then
            echo "❌ Android folder missing → creating with Capacitor"
            npx cap add android || true
            npx cap sync
          fi

          # Entrar al proyecto Android
          cd android

          # Verificación crítica
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew not found"
            exit 1
          fi

          chmod +x gradlew

          # Build APK
          ./gradlew assembleDebug

      # 9. Subir APK como artefacto descargable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: veymar-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
