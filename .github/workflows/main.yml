name: Build Veymar AI APK

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

steps:
  # 1. Clonar repositorio
  - name: Checkout code
    uses: actions/checkout@v4

  # 2. Node.js
  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22

  # 3. Java 21 (requerido por Capacitor 8)
  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '21'
      cache: gradle

  # 4. Instalar dependencias
  - name: Install dependencies
    run: npm install

  # 5. Compilar aplicación web
  - name: Build web app
    run: npm run build

  # 6. Regenerar Android limpio
  - name: Setup Android Project
    run: |
      rm -rf android
      npx cap add android
      npx cap sync android

  # 7. Construir APK
  - name: Build Android APK
    run: |
      cd android
      chmod +x gradlew
      ./gradlew clean
      ./gradlew assembleDebug --stacktrace

  # 8. Subir APK
  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: veymar-ai-apk
      path: android/app/build/outputs/apk/debug/app-debug.apk
