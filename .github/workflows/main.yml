name: Build Veymar AI APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node (SIN CACHE para evitar errores)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4. Construir web app
      - name: Build web app
        run: npm run build

      # 5. Capacitor sync seguro
      - name: Sync Capacitor
        run: |
          npm install @capacitor/cli @capacitor/android
          npx cap sync

      # 6. Debug estructura
      - name: Debug project structure
        run: |
          echo "📁 Root:"
          ls -la
          echo "📁 Android:"
          ls -la android || echo "❌ Android no existe"

      # 7. Java setup
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 8. Build APK (SEGURO)
      - name: Build Android APK
        run: |
          # Crear Android si no existe
          if [ ! -d "android" ]; then
            echo "❌ Android no existe → creando..."
            npx cap add android || true
            npx cap sync
          fi

          cd android

          # Verificar Gradle
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew no encontrado"
            exit 1
          fi

          chmod +x gradlew

          # Build APK
          ./gradlew assembleDebug

      # 9. Subir APK como artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: veymar-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
