8. Build Android APK

- name: Build Android APK
  run: |
  
  Crear Android si no existe
  
  if [ ! -d "android" ]; then
  echo "❌ Android no existe → creando..."
  npx cap add android
  fi
  
  npx cap sync android
  
  Forzar Java 17
  
  echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
  
  cd android
  chmod +x gradlew
  
  ./gradlew clean
  ./gradlew assembleDebug --stacktrace
