name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci

      - name: Build frontend
        run: npm run build

      # 🔥 DETECTAR AUTOMÁTICAMENTE EL WEB DIR REAL
      - name: Detectar webDir real
        run: |
          echo "Buscando index.html..."
          REAL_DIR=$(find dist -name index.html | head -n 1 | xargs dirname)
          echo "WEB_DIR=$REAL_DIR" >> $GITHUB_ENV
          echo "Detectado: $REAL_DIR"

      - name: Verificar output
        run: |
          echo "Usando carpeta: $WEB_DIR"
          ls -la $WEB_DIR

      # 🔥 REEMPLAZAR webDir dinámicamente
      - name: Forzar Capacitor config
        run: |
          node -e "
          const fs=require('fs');
          const path=require('path');
          const config=require('./capacitor.config.ts');
          "

      - name: Instalar Android
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Permisos
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
